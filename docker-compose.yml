version: "3.9"

services:
  usuario:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biblioteca-usuario
    restart: unless-stopped

    ports:
      - "9501:9501"

    environment:
      PORT:     9501
      NODE_ENV: production
      INFISICAL_ENV: ${INFISICAL_ENV}

      # Service Token do Infisical (https://app.infisical.com)
      # Gere em: Project → Access Control → Service Tokens
      CLIENT_ID:      ${CLIENT_ID}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID}
      INFISICAL_ENV: ${INFISICAL_ENV}

      # Banco de dados — vem do Infisical em produção
      DATABASE_URL: ${DATABASE_URL}

      # RabbitMQ
      RABBITMQ_URL:             ${RABBITMQ_URL:-amqp://admin:admin@academico3.rj.senac.br:5672}
      RABBITMQ_RECONNECT_DELAY: ${RABBITMQ_RECONNECT_DELAY:-5000}

    networks:
      - biblioteca-net

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  biblioteca-net:
    name: biblioteca-net
    driver: bridge
